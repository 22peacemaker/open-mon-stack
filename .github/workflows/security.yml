name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
